name: Publish Release

on:
  workflow_dispatch:

jobs:
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.changelog.outputs.tag }}
      skipped: ${{ steps.changelog.outputs.skipped }}
      clean_changelog: ${{ steps.changelog.outputs.clean_changelog }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PRIVATE_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: 16
      - run: |
          npm install conventional-changelog-conventionalcommits@7.0.2
          npm install conventional-recommended-bump@9.0.0

      - name: Set up version.json
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "1.0.0")
          echo "{\"version\":\"$VERSION\"}" > version.json

      - name: Create changelog
        id: changelog
        uses: TriPSs/conventional-changelog-action@v5.2.1
        with:
          github-token: ${{ secrets.PRIVATE_TOKEN }}
          git-user-name: 'WynnMountsBot'
          git-user-email: 'github-actions@github.com'
          pre-commit: ./.github/.pre-commit.js
          config-file-path: ./.github/.config.js
          version-file: ./version.json
          skip-version-file: true
          skip-git-pull: true
          pre-release: false
          release-count: 5

      - name: Upload version information
        uses: actions/upload-artifact@v4
        with:
          name: props
          path: gradle.properties

  build:
    name: Build
    needs: [changelog]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: props

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: 21
          cache: "gradle"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: |
            **/build/libs/wynnmounts-*.jar
            !**/build/libs/*-sources.jar
          if-no-files-found: error
          overwrite: true

  release-github:
    name: Release to Github
    if: ${{ needs.changelog.outputs.skipped != 'true' }}
    runs-on: ubuntu-latest
    needs: [build, changelog]
    steps:
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build

      - name: Create release and upload files
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.changelog.outputs.tag }}
          body: ${{ needs.changelog.outputs.changelog }}
          draft: false
          prerelease: false
          files: |
            **/build/libs/wynnmounts-*.jar
            !**/build/libs/*-sources.jar

  release-modrinth:
    name: Release to Modrinth
    if: ${{ needs.changelog.outputs.skipped != 'true' }}
    runs-on: ubuntu-latest
    needs: [build, changelog]
    steps:
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build

      - uses: Kir-Antipov/mc-publish@v3.3.0
        with:
          modrinth-id: H7Bj2Qzs
          modrinth-featured: true
          modrinth-unfeature-mode: subset
          modrinth-token: ${{ secrets.MODRINTH_API_TOKEN }}

          files: "**/build/libs/wynnmounts-*.jar"

          name: Wynncraft Mounts Helper ${{ needs.changelog.outputs.tag }}
          version: ${{ needs.changelog.outputs.tag }}
          version-type: release
          game-versions: 1.21.11
          changelog: ${{ needs.changelog.outputs.changelog }}

          loaders: fabric
          java: 21
